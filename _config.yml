# GitHub Pages Configuration
# La Materia que se Pregunta

# Site metadata
title: La Materia que se Pregunta
description: Un ensayo filosófico-científico sobre la realidad, la conciencia y la materia que se interroga a sí misma.
author: Jorge Eduardo Bravo Chaves

# URLs and paths
url: https://jorgebc420.github.io/MateriaQueSePregunta
baseurl: /MateriaQueSePregunta

# Language
lang: es

# Build settings
encoding: UTF-8
markdown: kramdown

# Disable Jekyll processing - this is a static HTML site
# The .nojekyll file in the root tells GitHub Pages not to process with Jekyll

# Exclude files from publishing
exclude:
  - .gitignore
  - .gitattributes
  - .nojekyll
  - node_modules/
  - vendor/
  - .DS_Store
  - Thumbs.db
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - .well-known/
